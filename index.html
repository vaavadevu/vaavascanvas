<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vaavascanvas</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<body>

  <header class="box">
    <h1>Vaavascanvas</h1>
    <nav>
      <ul class="link-list">
        <li><a>Startsida</a></li>
        <li><a href="pictures.html">Mina verk</a></li>
        <li><a href="social.html">Om mig</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="intro">
      <p>Välkommen till min portfolio! Här kan du se mina målningar, illustrationer och följa mitt konstnärliga arbete.</p>
    </section>

    <section class="homeGallery">
      <div class="galleryGrid" id="homeGalleryGrid">
        <!-- JS fyller på med de första målningarna -->
      </div>

    <div class="modal-info">
      <h3 id="modal-title"></h3>
      <p id="modal-size"></p>
      <p id="modal-desc"></p>
      <div id="modal-buttons"></div>
    </div>
    <span class="arrow left" id="modal-prev">&#10094;</span>
    <span class="arrow right" id="modal-next">&#10095;</span>
  </div>

  <footer>
