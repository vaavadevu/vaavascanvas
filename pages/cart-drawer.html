<!--
  CART DRAWER + OVERLAY
  Lägg till detta precis innan </body> på alla sidor.
  Eller inkludera via JS om du har en header-container.
-->

<!-- Overlay -->
<div id="cart-overlay"></div>

<!-- Cart Drawer -->
<div id="cart-drawer" role="dialog" aria-label="Varukorg">
  <div class="cart-header">
    <h2>Varukorg</h2>
    <button class="cart-close-btn" onclick="Cart.closeCart()" aria-label="Stäng varukorg">×</button>
  </div>

  <div id="cart-items">
    <div id="cart-empty">
      <div class="cart-empty-heading" data-i18n="cart_empty">Din varukorg är tom</div>
      <div class="cart-empty-copy" data-i18n="cart_empty_copy">Lägg till dina favoritmålningar eller något spännande från galleriet.</div>
      <a href="/pages/pictures.html" class="cart-empty-link" data-i18n="cart_empty_link">Till galleriet</a>
    </div>
  </div>

  <div id="cart-footer">
    <div class="cart-total-row">
      <span class="cart-total-label">Originalpriser</span>
      <span id="cart-subtotal">0 kr</span>
    </div>
    <div class="cart-total-row">
      <span class="cart-total-label">Fraktkostnad</span>
      <span id="cart-shipping">59 kr</span>
    </div>
    <div class="cart-total-row cart-total-final">
      <span class="cart-total-label">Totalt att betala</span>
      <span id="cart-total">0 kr</span>
    </div>
    <p class="cart-note">Leverans 3–7 arbetsdagar.</p>
    <button id="checkout-btn" onclick="Cart.checkout()">Till betalning →</button>
  </div>
</div>
