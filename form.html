<h3>Skicka en förfrågan</h3>
<p>Print, commission eller fråga? Hör av dig!</p>

<form action="https://formspree.io/f/xgolgnoj" method="POST" id="footerForm">
    <input type="hidden" name="_subject" id="f-subject" value="New Inquiry">

    <div class="formGroup">
        <label for="f-name">Namn</label>
        <input type="text" id="f-name" name="name" placeholder="Ditt namn" required />
    </div>

    <div class="formGroup">
        <label for="f-email">E-post</label>
        <input type="email" id="f-email" name="email" placeholder="din@email.com" required />
    </div>

    <div class="formGroup">
        <label for="f-type">Typ av förfrågan</label>
        <select id="f-type" name="type" required>
            <option value="">– Välj –</option>
            <option value="Originals">Köpa original</option>
            <option value="Prints">Print av befintlig målning</option>
            <option value="Commissions">Commission (beställd målning)</option>
            <option value="General">Allmän fråga</option>
        </select>
    </div>

    <div class="formGroup" id="f-printField" style="display:none;">
        <label for="f-artwork">Vilket verk?</label>
        <select id="f-artwork" name="artwork">
            <option value="">– Välj målning –</option>
        </select>
        <img id="f-artwork-preview" src="" alt="" class="artwork-preview" style="display:none;" />
    </div>

    <div class="formGroup" id="f-originalField" style="display:none;">
        <label for="f-artwork-original">Vilket verk?</label>
        <select id="f-artwork-original" name="artwork">
            <option value="">– Välj målning –</option>
        </select>
        <img id="f-artwork-original-preview" src="" alt="" class="artwork-preview" style="display:none;" />
    </div>

    <div class="formGroup">
        <label for="f-message">Meddelande</label>
        <textarea id="f-message" name="message" rows="3" placeholder="Berätta mer..."></textarea>
    </div>

    <div class="formGroup">
        <label class="checkbox-label">
            <input type="checkbox" id="f-subscribe" name="subscribe" />
            Ja, jag vill få mail när nya målningar läggs upp
        </label>
    </div>

    <button type="submit" class="submitBtn">✉ Skicka</button>
    <a href="#" id="shippingBtn" class="shipping-link">📦 Frakt & leveransinformation</a>
    <p id="formSuccess" style="display:none; color: var(--accent-green); font-weight:600; margin-top:10px;">
        Tack! Jag återkommer så snart som möjligt. 🎨
    </p>
</form>
