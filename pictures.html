<!DOCTYPE html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mina målningar – Vaavascanvas</title>
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/gallery.css" />
  <link rel="stylesheet" href="css/fab.css" />
  <link rel="stylesheet" href="css/modal.css" />
  <link rel="stylesheet" href="css/form.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css" />
</head>

<body id="main">

  <div id="header-container"></div>

  <main>
    <div id="gallery-wrapper" style="position:relative;">
      <div class="gallery" id="gallery"></div>
    </div>
  </main>



  <div class="modal" id="modal">
    <span class="close" id="modal-close">&times;</span>
    <div class="modalInner">
      <div class="modalLeft">
        <div class="modalImageWrapper">
          <span class="modalArrow modalArrowLeft" id="modal-img-prev">&#10094;</span>
          <img id="modal-img" src="" alt="" />
          <span class="modalArrow modalArrowRight" id="modal-img-next">&#10095;</span>
        </div>
        <div class="modalThumbs" id="modal-thumbs"></div>
      </div>
      <div class="modalRight">
        <h3 id="modal-title"></h3>
        <p id="modal-size"></p>
        <p id="modal-desc"></p>
        <div id="modal-buttons"></div>
      </div>
    </div>
    <span class="arrow left" id="modal-prev">&#10094;</span>
    <span class="arrow right" id="modal-next">&#10095;</span>
  </div>

  <footer id="footer">
    <div class="footerContent">
      <div class="footerAbout">
        <img src="images/devika.jpg" alt="Devika" class="footerImg" />
        <h2 data-i18n="footer_about_heading">Hej, Devika här!</h2>
        <p data-i18n="footer_about_p1">Jag är konstnär och illustratör baserad i Sverige.</p>
        <p data-i18n="footer_about_p2">Genom min konst vill jag skapa närvaro och igenkänning.</p>
        <div class="footerLinks">
          <a href="https://www.instagram.com/vaavascanvas/" target="_blank">
            <i class="fa fa-instagram"></i> @vaavascanvas
          </a>
          <a href="mailto:exempel@mail.com">
            <i class="fa fa-envelope"></i> mail@mail.com
          </a>
        </div>
        <button class="subscribe-btn" id="subscribeBtn" data-i18n="footer_subscribe_btn">
          🔔 Prenumerera på nyheter
        </button>
      </div>
      <div class="footerDivider"></div>
      <div class="footerFormSection" id="formContainer"></div>
    </div>
    <p class="footerCopy" data-i18n="footer_copy">© 2026 Devika – All rights reserved</p>
  </footer>

  <div id="filter-fab">
    <div class="fab-popup">
      <button class="fab-filter-btn active" data-filter="all" data-i18n="filter_all">Alla</button>
      <button class="fab-filter-btn" data-filter="for_sale" data-i18n="filter_for_sale">Till salu</button>
      <button class="fab-filter-btn" data-filter="sold" data-i18n="filter_sold">Sålda</button>
      <button class="fab-filter-btn" data-filter="personal" data-i18n="filter_personal">Personliga</button>
    </div>
    <button class="fab-main-btn" id="fab-trigger" aria-label="Filtrera">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="6" x2="20" y2="6" />
        <circle cx="8" cy="6" r="2" fill="currentColor" stroke="none" />
        <line x1="4" y1="12" x2="20" y2="12" />
        <circle cx="16" cy="12" r="2" fill="currentColor" stroke="none" />
        <line x1="4" y1="18" x2="20" y2="18" />
        <circle cx="10" cy="18" r="2" fill="currentColor" stroke="none" />
      </svg>
    </button>
  </div>

  <div id="modals-container"></div>

  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/paintings.js"></script>
  <script src="js/state.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/contact.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/script.js"></script>



</body>

</html>
